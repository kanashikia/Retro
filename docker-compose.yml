version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: retro-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: retro
      MYSQL_USER: root
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: retro-app
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=retro
      - VITE_SOCKET_URL=http://localhost:3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=super_secret_retro_key_123
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:
